appId: com.workmap.app
productName: Workmap
directories:
  output: release
files:
  - main.js
  - "!node_modules"
extraResources:
  - from: ../backend/dist
    to: backend
    filter:
      - "**/*"
  - from: ../frontend/dist
    to: frontend
    filter:
      - "**/*"
mac:
  target: dmg
  icon: icon.png
  category: public.app-category.productivity
win:
  target: nsis
  icon: icon.png
linux:
  target: AppImage
  icon: icon.png
